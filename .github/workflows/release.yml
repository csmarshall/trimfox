name: release

# Cut a release by pushing a version tag:  git tag v1.0.0 && git push --tags
# This builds the curated single-file zip (make-release.sh) and publishes it as a
# GitHub Release asset, so the README's "latest release zip" link always resolves.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g. 1.0.0) — dispatch runs don't publish a release"
        required: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # tags, for make-release.sh's version fallback

      - name: Build the release zip
        run: |
          ver="${GITHUB_REF_NAME#v}"
          [ "${{ github.event_name }}" = "workflow_dispatch" ] && ver="${{ inputs.version }}"
          ./make-release.sh "$ver"

      - name: Publish the GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/trimfox-*.zip \
            --title "trimfox $GITHUB_REF_NAME" \
            --generate-notes

      - name: Upload the zip as a build artifact (dispatch runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: trimfox-zip
          path: dist/trimfox-*.zip
